<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로또 번호 추천기</title>
  <meta
    name="description"
    content="중복 없는 로또 번호를 한 번에 여러 조합으로 추천해주는 사이트"
  />
  <link href="/style.css" rel="stylesheet" />
</head>
<body>
  <main class="page">
    <section class="hero">
      <p class="eyebrow">LOTTO PICK 6/45</p>
      <h1>로또 번호를 깔끔하게 추천해드립니다.</h1>
      <p class="hero-text">
        버튼 한 번으로 중복 없는 번호 조합을 생성하고, 마음에 드는 조합을 바로 확인하세요.
      </p>
    </section>

    <section class="panel">
      <div class="controls">
        <label class="field" for="set-count">
          <span>추천 조합 수</span>
          <select id="set-count">
            <option value="1">1개</option>
            <option value="3" selected>3개</option>
            <option value="5">5개</option>
            <option value="7">7개</option>
          </select>
        </label>
        <button id="generate-button" class="generate-button" type="button">
          번호 추천받기
        </button>
      </div>

      <div class="summary" id="summary">
        오늘의 추천 조합 3개를 준비했습니다.
      </div>

      <section class="results" id="results" aria-live="polite"></section>
    </section>
  </main>

  <script defer type="text/javascript" src="/main.js"></script>
</body>
</html>
